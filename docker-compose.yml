services:

  # ─── Base de données PostgreSQL ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: gmao_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-gmao}
      POSTGRES_USER:     ${POSTGRES_USER:-gmao_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gmao_user} -d ${POSTGRES_DB:-gmao}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - gmao_net

  # ─── Stockage de fichiers MinIO (S3-compatible) ────────────────────
  minio:
    image: minio/minio:latest
    container_name: gmao_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY:-gmao_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-changeme}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - gmao_net

  # ─── Création du bucket MinIO (exécution unique au démarrage) ──────
  minio-init:
    image: minio/mc:latest
    container_name: gmao_minio_init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-gmao_admin} ${MINIO_SECRET_KEY:-changeme} --quiet;
        mc mb --ignore-existing local/${MINIO_BUCKET_NAME:-gmao-media};
        echo 'Bucket MinIO prêt.';
      "
    networks:
      - gmao_net

  # ─── API Backend Node.js ───────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: gmao_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV:               production
      PORT:                   4000
      DATABASE_URL:           postgresql://${POSTGRES_USER:-gmao_user}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-gmao}
      JWT_SECRET:             ${JWT_SECRET:?Définissez JWT_SECRET dans le fichier .env}
      JWT_ACCESS_EXPIRES_IN:  ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      FRONTEND_URL:           ${FRONTEND_URL:-http://localhost}
      LOG_LEVEL:              ${LOG_LEVEL:-info}
      MINIO_ENDPOINT:         minio
      MINIO_PORT:             9000
      MINIO_USE_SSL:          "false"
      MINIO_ACCESS_KEY:       ${MINIO_ACCESS_KEY:-gmao_admin}
      MINIO_SECRET_KEY:       ${MINIO_SECRET_KEY:-changeme}
      MINIO_BUCKET_NAME:      ${MINIO_BUCKET_NAME:-gmao-media}
      SEED_DB:                ${SEED_DB:-false}
    volumes:
      - seed_flag:/var/lib/gmao
    networks:
      - gmao_net

  # ─── Frontend React servi par Nginx (+ reverse proxy API) ─────────
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: gmao_nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-80}:80"
    networks:
      - gmao_net

volumes:
  postgres_data:
  minio_data:
  seed_flag:

networks:
  gmao_net:
    driver: bridge
