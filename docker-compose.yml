services:
  postgres:
    image: postgres:16-alpine
    container_name: gmao_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-gmao}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gmao_secret}
      POSTGRES_DB: ${DB_NAME:-gmao_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-gmao} -d ${DB_NAME:-gmao_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: gmao_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gmao.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
